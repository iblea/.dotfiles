# Catppuccin 테마
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# application 모듈 텍스트를 pane_title로 변경
set -g @catppuccin_application_text " #{?#{m:*Claude Code*,#{pane_title}},#{pane_title},#{pane_current_command}}"

# 윈도우 탭 텍스트: Claude Code면 pane_title, 아니면 pane_current_command
set -g @catppuccin_window_text " #{?#{m:*Claude Code*,#{pane_title}},#{pane_title},#{pane_current_command}}"
set -g @catppuccin_window_current_text " #{?#{m:*Claude Code*,#{pane_title}},#{pane_title},#{pane_current_command}}"

# 윈도우 번호: pane 2개 이상이면 "윈도우.pane인덱스" 형식
set -g @catppuccin_window_number "#{?#{e|>:#{window_panes},1},#I.#{pane_index},#I}"
set -g @catppuccin_window_current_number "#{?#{e|>:#{window_panes},1},#I.#{pane_index},#I}"

# 플러그인 로드
run ~/.config/tmux/catppuccin/catppuccin.tmux

# 상태바 구성
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
